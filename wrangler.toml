name = "gemini-relay"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# HuggingFace에 업로드한 LoRA 모델 ID (예: "your-hf-id/mms-interviewer-lora")
HF_MODEL_ID = "ai-mms/ai-gemma-lora-model"

# 아래 시크릿은 wrangler CLI로 별도 등록:
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put HF_TOKEN
